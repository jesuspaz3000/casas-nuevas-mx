# Misma red de compose: el DNS interno resuelve los nombres de servicio (postgres, redis).
# Si en tu VPS fallara el DNS entre contenedores, fija SPRING_DATASOURCE_URL / REDIS_HOST / POSTGRES_WAIT_HOST a IPs.
services:
  postgres:
    image: postgres:18
    container_name: casas-postgres
    environment:
      POSTGRES_DB: casas_nuevas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: litonaso
    # Evita fallos raros de init en VPS con poco /dev/shm por defecto (64 MiB).
    shm_size: "256m"
    volumes:
      - casas_postgres_data:/var/lib/postgresql/data
    networks:
      - casas-network
    # TCP explícito: más predecible que socket/pg_isready por defecto en algunas imágenes.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s
    restart: always

  redis:
    image: redis:7-alpine
    container_name: casas-redis
    ports:
      - "6380:6379"
    networks:
      - casas-network
    restart: always

  backend:
    build: ./backend
    container_name: casas-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: litonaso
      JWT_SECRET: CAMBIA_ESTE_SECRET
      JWT_ISSUER: casas-nuevas-backend
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SUPERADMIN_EMAIL: admin@admin.com
      SUPERADMIN_PASSWORD: qwerty.123
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: veyito30000@gmail.com
      MAIL_PASSWORD: qrcelhttsykflffs
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/casas_nuevas_db?sslmode=disable
      # docker-entrypoint.sh: mismo host que el JDBC hasta que 5432 acepte TCP.
      POSTGRES_WAIT_HOST: postgres
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - casas-network
    restart: always

  frontend:
    build: ./frontend
    container_name: casas-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - casas-network
    restart: always

volumes:
  casas_postgres_data:

networks:
  casas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
