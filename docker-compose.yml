# Red fija: en algunos VPS el DNS entre contenedores falla (UnknownHost) y host.docker.internal:puerto da "connection refused".
# Las IPs 172.30.0.10 / 172.30.0.11 evitan DNS y el salto al host; no hace falta publicar Postgres en el host.
services:
  postgres:
    image: postgres:18
    container_name: casas-postgres
    environment:
      POSTGRES_DB: casas_nuevas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: litonaso
    # Evita fallos raros de init en VPS con poco /dev/shm por defecto (64 MiB).
    shm_size: 256mb
    volumes:
      - casas_postgres_data:/var/lib/postgresql/data
    networks:
      casas-network:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d casas_nuevas_db"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: always

  redis:
    image: redis:7-alpine
    container_name: casas-redis
    ports:
      - "6380:6379"
    networks:
      casas-network:
        ipv4_address: 172.30.0.11
    restart: always

  backend:
    build: ./backend
    container_name: casas-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: litonaso
      JWT_SECRET: CAMBIA_ESTE_SECRET
      JWT_ISSUER: casas-nuevas-backend
      REDIS_HOST: 172.30.0.11
      REDIS_PORT: "6379"
      SUPERADMIN_EMAIL: admin@admin.com
      SUPERADMIN_PASSWORD: qwerty.123
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: veyito30000@gmail.com
      MAIL_PASSWORD: qrcelhttsykflffs
      SPRING_DATASOURCE_URL: jdbc:postgresql://172.30.0.10:5432/casas_nuevas_db?sslmode=disable
      # docker-entrypoint.sh: misma IP hasta que el puerto acepte conexiones (evita race al iniciar).
      POSTGRES_WAIT_HOST: 172.30.0.10
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - casas-network
    restart: always

  frontend:
    build: ./frontend
    container_name: casas-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - casas-network
    restart: always

volumes:
  casas_postgres_data:

networks:
  casas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
