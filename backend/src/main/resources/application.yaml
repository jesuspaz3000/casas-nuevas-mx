server:
  port: 8080
  servlet:
    context-path: /api
  forward-headers-strategy: framework
  error:
    include-stacktrace: never
    include-message: always

spring:
  application:
    name: casas-nuevas-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/casas_nuevas_db}
    username: postgres
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000
  issuer: ${JWT_ISSUER:casas-nuevas-backend}

app:
  auth:
    cookie:
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAMESITE:Lax}
      domain: ${AUTH_COOKIE_DOMAIN:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
    filter: true

file:
  upload-dir: uploads

logging:
  level:
    com.casasnuevas.backend.auth: DEBUG